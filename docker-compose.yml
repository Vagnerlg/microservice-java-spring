include:
  - docker-compose.util.yml
  - docker-compose.data.yml
  - docker-compose.monitoring.yml

x-otel: &otel-env
  OTEL_ENDPOINT: http://otel-collector:4318
  MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
  MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
  MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT: http://otel-collector:4318/v1/logs

networks:
  platform-net:
    name: platform-net
    external: true

services:

  observability-lib:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./libs/observability-lib:/app
      - ${HOME}/.m2:/root/.m2
    command:
      - mvn
      - install
      - -DskipTests

  product:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./services/product:/app
      - ${HOME}/.m2:/root/.m2
    ports:
      - "5005:5005"
    networks:
      - platform-net
    environment:
      <<: *otel-env
      MONGO_HOST: mongodb
      KAFKA_BROKERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/keycloak/realms/ecommerce
    command:
      - ./mvnw
      - spring-boot:run
      - "-Dspring-boot.run.jvmArguments=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.product.rule=PathPrefix(`/api/products`)"
      - "traefik.http.routers.product.middlewares=strip-api@docker"
      - "traefik.http.services.product.loadbalancer.server.port=8101"
    depends_on:
      observability-lib:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
      kafka:
        condition: service_started
      otel-collector:
        condition: service_started

  auth:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./services/auth:/app
      - ${HOME}/.m2:/root/.m2
