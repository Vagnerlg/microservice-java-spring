include:
  - docker-compose.data.yml
  - docker-compose.monitoring.yml

x-otel: &otel-env
  OTEL_ENDPOINT: http://otel-collector:4318
  MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
  MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
  MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT: http://otel-collector:4318/v1/logs

services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    ports:
      - "8084:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  product:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./services/product:/app
      - ${HOME}/.m2:/root/.m2
    ports:
      - "8101:8101"
      - "8102:8102"
      - "5005:5005"
    environment:
      <<: *otel-env
      MONGO_HOST: mongodb
      KAFKA_BROKERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ecommerce
    command:
      - ./mvnw
      - spring-boot:run
      - "-Dspring-boot.run.jvmArguments=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      - mongodb
      - kafka
      - otel-collector

  auth:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./services/auth:/app
      - ${HOME}/.m2:/root/.m2
    ports:
      - "8120:8120"
      - "8121:8121"
      - "5006:5006"
    environment:
      <<: *otel-env
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:29092
      KEYCLOAK_SERVER_URL: http://keycloak:8080
    command:
      - ./mvnw
      - spring-boot:run
      - "-Dspring-boot.run.jvmArguments=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
    depends_on:
      - redis
      - kafka
      - keycloak
      - otel-collector

  search:
