name: Quality Check (reusable)

on:
  workflow_call:
    inputs:
      service-path:
        required: true
        type: string
      service-name:
        required: true
        type: string

jobs:
  quality:
    name: Build & Quality Gates
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.service-path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build shared libs
        run: |
          for lib in $GITHUB_WORKSPACE/libs/*/; do
            [ -f "$lib/pom.xml" ] && mvn -f "$lib/pom.xml" install -q -DskipTests
          done

      - name: Run tests + static analysis + coverage check
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/target/site/jacoco/
          retention-days: 1
