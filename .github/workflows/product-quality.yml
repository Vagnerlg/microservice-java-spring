name: Quality

on:
  push:
    paths:
      - 'services/product/**'
  pull_request:
    paths:
      - 'services/product/**'

jobs:
  quality:
    name: Build & Quality Gates
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/product

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests + static analysis + coverage check
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: services/product/target/site/jacoco/
          retention-days: 1
