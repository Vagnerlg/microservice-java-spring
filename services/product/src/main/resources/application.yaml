server:
  port: ${SERVER_PORT:8101}

spring:
  application:
    name: product
  mongodb:
    host: ${MONGO_HOST:localhost}
    port: ${MONGO_PORT:27017}
    username: ${MONGO_USERNAME:admin}
    password: ${MONGO_PASSWORD:admin}
    database: ${MONGO_DATABASE:product}
    authentication-database: ${MONGO_AUTH_DATABASE:admin}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

kafka:
  topics:
    product: product

management:
  server:
    port: ${MANAGEMENT_PORT:8102}
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_ENDPOINT:http://localhost:4318}/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/logs
  logging:
    export:
      otlp:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  structured:
    format:
      console: ecs
