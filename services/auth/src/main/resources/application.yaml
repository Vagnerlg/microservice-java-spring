server:
  port: ${SERVER_PORT:8120}

spring:
  application:
    name: auth
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

kafka:
  topics:
    user: user

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8084}
  realm: ${KEYCLOAK_REALM:ecommerce}
  client-id: ${KEYCLOAK_CLIENT_ID:auth-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:auth-service-secret}
  admin-username: ${KEYCLOAK_ADMIN:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

management:
  server:
    port: ${MANAGEMENT_PORT:8121}
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_ENDPOINT:http://localhost:4318}/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/logs
  logging:
    export:
      otlp:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  structured:
    format:
      console: ecs
